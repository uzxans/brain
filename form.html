<!DOCTYPE html>
<html lang="ru" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BRAIN — Система автоматизации бизнеса</title>

  <!-- Шрифт с характером — Sora (геометрический, технологичный) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Bootstrap 5 + Bootstrap Icons -->
  <link href="/accets/css/bootstrap.css" rel="stylesheet">
  <link rel="stylesheet" href="/accets/css/bootstrap-icons.css">

  <!-- Swiper -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js" defer></script>

  <!-- Наши стили (путь как у вас в проекте) -->
  <link rel="stylesheet" href="/accets/css/main.css">

  <!--
    Тема определяется ДО рендера страницы, чтобы не было "мигания".
    Скрипт маленький — намеренно inline в <head>.
  -->
  <script>
    (function () {
      const saved = localStorage.getItem('brainTheme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = saved || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>

<body>


  <main class="form-section" aria-label="Регистрационная форма">
    <div class="form-section__overlay"></div>
    <div class="container form-section__container">
      <div class="form-card">
        <div class="form-card__header text-center">
          <h1 class="form-card__title">Добро пожаловать в Brain</h1>
          <p class="form-card__subtitle">Продвигайте свои навыки с нами</p>
        </div>

        <form class="signup-form" onsubmit="event.preventDefault();">
          <label class="signup-field">
            <span class="signup-field__label">Имя</span>
            <input class="signup-field__input" type="text" placeholder="Введите имя" required>
          </label>

          <label class="signup-field">
            <span class="signup-field__label">Телефон (обязательно)</span>
            <input class="signup-field__input" type="tel" placeholder="Введите номер телефона" required>
          </label>

          <label class="signup-field">
            <span class="signup-field__label">Область</span>
            <select class="signup-field__select" required>
              <option value="" disabled selected>Выберите область</option>
              <option>Ташкент</option>
              <option>Самарканд</option>
              <option>Бухара</option>
            </select>
          </label>

          <label class="signup-field">
            <span class="signup-field__label">Район</span>
            <select class="signup-field__select" required>
              <option value="" disabled selected>Выберите район</option>
              <option>Яшнобод</option>
              <option>Мирабад</option>
              <option>Яккасарай</option>
            </select>
          </label>

          <button type="submit" class="btn btn-primary-custom form-submit">Отправить</button>
        </form>
      </div>
    </div>
  </main>



  <!-- ══════════════════════════════════════════════
         SCRIPTS
    ══════════════════════════════════════════════ -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
